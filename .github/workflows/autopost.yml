name: Autopost articles
on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
  workflow_dispatch: {}     # можно запустить вручную из вкладки Actions
permissions:
  contents: write
concurrency:
  group: autopost
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build new articles
        run: python tools/autopost/autopost_runner.py
      - name: Commit results
        run: |
          git config user.name  "avare-bot"
          git config user.email "tech@avareit.com"
          git add learn assets/media/learn sitemap.xml
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Autopost: build articles [skip ci]"
            git push
          fi
